<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#3B82F6" />
  <title>DET Fill in the Blank</title>
  <style>
    :root {
      --blue:   #3B82F6;
      --blue-d: #2563EB;
      --orange: #F59E0B;
      --red:    #EF4444;
      --green:  #10B981;
      --text:   #111827;
      --dim:    #9CA3AF;
      --border: #E5E7EB;
      --panel:  #F9FAFB;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
      color: var(--text);
    }

    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .screen.hidden { display: none; }

    @media (min-width: 520px) {
      .screen {
        max-width: 480px;
        left: 50%;
        transform: translateX(-50%);
        border-left:  1px solid var(--border);
        border-right: 1px solid var(--border);
      }
    }

    /* ── HOME ─────────────────────────────────────────────────────────────── */
    #home {
      overflow-y: auto;
      justify-content: flex-start;
      text-align: center;
      padding: 40px 28px 36px;
      gap: 12px;
    }
    #home h1 { font-size: 34px; font-weight: 800; letter-spacing: -1px; }
    .sub  { color: var(--dim); font-size: 14px; }
    .divider { width: 100%; height: 1px; background: var(--border); margin: 2px 0; }

    .desc {
      color: #374151;
      font-size: 15px;
      line-height: 1.75;
      text-align: left;
    }
    .desc strong { color: var(--blue); }

    .hint-box {
      background: var(--panel);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--dim);
      line-height: 1.8;
      text-align: left;
      width: 100%;
    }

    .btn-row { display: flex; gap: 10px; width: 100%; }

    .btn-secondary {
      flex: 1;
      height: 48px;
      background: var(--panel);
      color: #374151;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
    }
    .btn-secondary:active { background: #F3F4F6; }
    .btn-secondary.active {
      background: #EFF6FF;
      border-color: var(--blue);
      color: var(--blue);
    }

    .btn-start {
      width: 100%;
      height: 54px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    .btn-start:active { background: var(--blue-d); }
    .btn-start:disabled { background: var(--dim); cursor: default; }

    /* ── SHARED TIMER AREA ────────────────────────────────────────────────── */
    .timer-area {
      width: 100%;
      padding: 20px 24px 0;
      flex-shrink: 0;
    }
    .timer-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .big-timer {
      font-size: 52px;
      font-weight: 800;
      letter-spacing: -2px;
      color: var(--text);
      transition: color 0.3s;
    }
    .big-timer.urgent { color: var(--red); }
    .q-counter {
      font-size: 16px;
      font-weight: 600;
      color: var(--dim);
    }
    .prog-wrap {
      width: 100%;
      height: 5px;
      background: var(--border);
      margin-top: 12px;
      flex-shrink: 0;
    }
    .prog-bar {
      height: 100%;
      background: var(--orange);
      transition: width 0.9s linear, background 0.3s;
    }

    /* ── QUIZ ─────────────────────────────────────────────────────────────── */
    #quiz { justify-content: flex-start; }

    .quiz-body {
      flex: 1;
      width: 100%;
      padding: 20px 20px 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .cat-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--blue);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .pos-hint {
      display: inline-block;
      background: #FEF3C7;
      color: #92400E;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.3px;
      padding: 2px 7px;
      border-radius: 999px;
      text-transform: none;
    }

    .sentence-card {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 20px 18px;
      width: 100%;
    }

    .sentence-text {
      font-size: 16px;
      line-height: 2.5;
      color: #374151;
    }

    /* Letter box common */
    .lbox {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 34px;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      font-size: 15px;
      font-weight: 700;
      text-align: center;
      font-family: 'Courier New', Courier, monospace;
      flex-shrink: 0;
      vertical-align: middle;
    }
    .lbox.revealed {
      background: #D1FAE5;
      color: #065F46;
      border-color: #6EE7B7;
    }

    /* Input letter box */
    input.lbox {
      background: #fff;
      color: var(--text);
      cursor: text;
      outline: none;
      padding: 0;
      -webkit-appearance: none;
      appearance: none;
    }
    input.lbox:focus {
      border-color: var(--blue);
      background: #EFF6FF;
    }
    .lbox.correct {
      background: #D1FAE5 !important;
      color: #065F46 !important;
      border-color: #6EE7B7 !important;
    }
    .lbox.incorrect {
      background: #FEE2E2 !important;
      color: #991B1B !important;
      border-color: #FCA5A5 !important;
    }

    /* Word wrapper (inline) */
    .word-wrap {
      display: inline-flex;
      align-items: center;
      vertical-align: middle;
      gap: 2px;
      margin: 0 3px;
    }
    /* Responsive box sizes for longer words */
    .word-wrap.sz-md .lbox { width: 24px; font-size: 13px; }
    .word-wrap.sz-sm .lbox { width: 20px; font-size: 12px; }

    /* Feedback bar */
    .feedback {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      text-align: center;
    }
    .feedback.hidden { display: none; }
    .feedback.correct-fb  { background: #D1FAE5; color: #065F46; }
    .feedback.incorrect-fb { background: #FEE2E2; color: #991B1B; }

    /* Quiz footer */
    .quiz-footer {
      width: 100%;
      padding: 14px 20px 32px;
      flex-shrink: 0;
    }

    /* ── REVIEW ────────────────────────────────────────────────────────────── */
    #review { justify-content: flex-start; }
    .review-header {
      width: 100%;
      padding: 20px 20px 14px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .review-title  { font-size: 22px; font-weight: 800; }
    .review-score  { font-size: 15px; font-weight: 600; color: var(--dim); }
    .review-pct    { font-size: 30px; font-weight: 800; color: var(--blue); }
    .review-list {
      flex: 1;
      width: 100%;
      padding: 0 16px 16px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .rv-card {
      border-radius: 12px;
      border: 1.5px solid var(--border);
      padding: 14px 16px;
      font-size: 14px;
      line-height: 1.8;
    }
    .rv-card.rv-ok  { border-color: #6EE7B7; background: #F0FDF4; }
    .rv-card.rv-ng  { border-color: #FCA5A5; background: #FFF5F5; }
    .rv-num  { font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 6px; }
    .rv-ok  .rv-num { color: #059669; }
    .rv-ng  .rv-num { color: #DC2626; }
    .rv-sentence { color: #374151; }
    .rv-answer {
      margin-top: 6px;
      font-size: 13px;
    }
    .rv-ok  .rv-answer { color: #059669; }
    .rv-ng  .rv-answer { color: #DC2626; }
    .rv-def {
      margin-top: 6px;
      font-size: 13px;
      color: #6B7280;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .rv-pos {
      display: inline-block;
      background: #E0E7FF;
      color: #4338CA;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 1px 6px;
      border-radius: 999px;
      flex-shrink: 0;
    }
    .ans-word {
      font-family: 'Courier New', Courier, monospace;
      font-weight: 700;
      font-size: 15px;
      background: #fff;
      border-radius: 4px;
      padding: 1px 5px;
    }
    .review-footer {
      width: 100%;
      padding: 12px 16px 32px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<!-- ── HOME ──────────────────────────────────────────────────────────────── -->
<div id="home" class="screen">
  <p style="font-size:1.05rem; font-weight:700; color:#E11D48; text-align:center; margin-bottom:4px;">예은아, DET 합격까지 화이팅! 💕</p>
  <h1>DET Fill in the Blank</h1>
  <p class="sub">Duolingo English Test · Fill in the Blank</p>
  <div class="divider"></div>
  <p class="desc">
    문장 속 단어의 <strong>빈 글자</strong>를 채워보세요.<br>
    초록 박스는 힌트, 흰 박스에 한 글자씩 입력합니다.
  </p>
  <div class="hint-box">
    ⏱ 제한 시간: <strong style="color:#374151">20초</strong> / 문제<br>
    📝 총 421문제 중 랜덤 10문제 출제<br>
    ✏️ 각 칸에 글자 입력 → Enter 또는 확인 버튼<br>
    📋 10문제 완료 후 전체 결과 리뷰 가능
  </div>
  <button class="btn-start" onclick="startQuiz()">시  작</button>
</div>

<!-- ── QUIZ ──────────────────────────────────────────────────────────────── -->
<div id="quiz" class="screen hidden">
  <div class="timer-area">
    <div class="timer-row">
      <div class="big-timer" id="q-timer">20</div>
      <div class="q-counter"  id="q-counter">1 / 10</div>
    </div>
  </div>
  <div class="prog-wrap">
    <div class="prog-bar" id="q-bar" style="width:100%"></div>
  </div>
  <div class="quiz-body">
    <div class="sentence-card" id="sentence-card"></div>
  </div>
  <div class="quiz-footer">
    <button class="btn-start" id="btn-action" onclick="handleAction()">확인</button>
  </div>
</div>

<!-- ── REVIEW ───────────────────────────────────────────────────────────── -->
<div id="review" class="screen hidden">
  <div class="review-header">
    <div class="review-title" id="rv-emoji">🎉 결과</div>
    <div class="review-pct"  id="rv-pct">0%</div>
    <div class="review-score" id="rv-score">0 / 10</div>
  </div>
  <div class="divider" style="width:calc(100% - 32px); margin: 0 16px;"></div>
  <div class="review-list" id="rv-list"></div>
  <div class="review-footer">
    <div class="btn-row">
      <button class="btn-secondary" onclick="show('home')">홈으로</button>
      <button class="btn-secondary" onclick="startQuiz()">다시 풀기</button>
    </div>
  </div>
</div>

/* ════════════════════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════════════════════ */
const TOTAL = 10;
let questions     = [];
let idx           = 0;
let score         = 0;
let results       = [];  // { q, userWord, correct }
let timerInterval = null;
let timeLeft      = 20;
let phase         = 'input'; // 'input' | 'done'
let autoTimer     = null;

/* ════════════════════════════════════════════════════════════════
   NAVIGATION
════════════════════════════════════════════════════════════════ */
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  questions = shuffle(QUESTIONS).slice(0, TOTAL);
  idx     = 0;
  score   = 0;
  results = [];
  show('quiz');
  loadQuestion();
}

/* ════════════════════════════════════════════════════════════════
   QUESTION RENDERING
════════════════════════════════════════════════════════════════ */
function loadQuestion() {
  clearInterval(timerInterval);
  clearTimeout(autoTimer);
  phase = 'input';

  const q = questions[idx];
  document.getElementById('q-counter').textContent = `${idx + 1} / ${TOTAL}`;

  // reset action button
  const btn = document.getElementById('btn-action');
  btn.textContent = idx === TOTAL - 1 ? '제출 →' : '다음 →';
  btn.disabled = false;
  btn.style.background = '';

  // build word boxes
  const letters = q.word.split('');
  const wLen    = letters.length;
  const szClass = wLen > 10 ? 'sz-sm' : wLen > 7 ? 'sz-md' : '';

  const wordHtml = letters.map((ch, i) => {
    if (q.reveal.includes(i)) {
      return `<span class="lbox revealed">${ch}</span>`;
    }
    return `<input class="lbox" type="text" maxlength="1" data-pos="${i}"
      autocomplete="off" autocorrect="off" autocapitalize="off"
      spellcheck="false" inputmode="text" />`;
  }).join('');

  const posHint = q.pos ? `<span class="pos-hint">${q.pos}</span>` : '';
  document.getElementById('sentence-card').innerHTML = `
    <div class="cat-label">${esc(q.cat)}${posHint}</div>
    <p class="sentence-text">
      ${esc(q.before)}<span class="word-wrap ${szClass}">${wordHtml}</span>${esc(q.after)}
    </p>`;

  setupInputs();
  startTimer();

  // focus first blank
  setTimeout(() => {
    document.querySelector('input.lbox')?.focus();
  }, 80);
}

function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function setupInputs() {
  const inputs = [...document.querySelectorAll('input.lbox')];
  inputs.forEach((inp, i) => {
    inp.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !inp.value && i > 0) {
        e.preventDefault();
        inputs[i - 1].focus();
        inputs[i - 1].value = '';
      } else if (e.key === 'Enter') {
        handleAction();
      }
    });
    inp.addEventListener('input', () => {
      // keep only single lowercase letter
      inp.value = inp.value.replace(/[^a-zA-Z]/g, '').toLowerCase().slice(-1);
      if (inp.value && i < inputs.length - 1) inputs[i + 1].focus();
    });
  });
}

/* ════════════════════════════════════════════════════════════════
   TIMER
════════════════════════════════════════════════════════════════ */
function startTimer() {
  timeLeft = 20;
  updateTimerUI();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerUI();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      recordAndAdvance();
    }
  }, 1000);
}

function updateTimerUI() {
  const el  = document.getElementById('q-timer');
  const bar = document.getElementById('q-bar');
  el.textContent = timeLeft;
  el.classList.toggle('urgent', timeLeft <= 5);
  bar.style.width      = (timeLeft / 20 * 100) + '%';
  bar.style.background = timeLeft <= 5 ? 'var(--red)' : 'var(--orange)';
}

/* ════════════════════════════════════════════════════════════════
   ANSWER RECORD & ADVANCE
════════════════════════════════════════════════════════════════ */
function handleAction() {
  if (phase === 'input') recordAndAdvance();
}

function recordAndAdvance() {
  if (phase !== 'input') return;
  phase = 'done';
  clearInterval(timerInterval);
  clearTimeout(autoTimer);

  const q      = questions[idx];
  const inputs = [...document.querySelectorAll('input.lbox')];
  const letters = q.word.split('');

  // collect user's typed letters
  let userWord = '';
  letters.forEach((ch, i) => {
    if (q.reveal.includes(i)) {
      userWord += ch;
    } else {
      const inp = inputs.find(el => +el.dataset.pos === i);
      userWord += inp ? (inp.value.toLowerCase() || '_') : '_';
    }
  });

  const correct = userWord === q.word;
  if (correct) score++;
  results.push({ q, userWord, correct });

  idx++;
  if (idx >= TOTAL) showReview();
  else loadQuestion();
}

/* ════════════════════════════════════════════════════════════════
   REVIEW SCREEN
════════════════════════════════════════════════════════════════ */
function showReview() {
  show('review');
  const pct = Math.round(score / TOTAL * 100);

  const emoji =
    pct >= 90 ? '🏆' :
    pct >= 70 ? '🎉' :
    pct >= 50 ? '💪' : '📖';

  document.getElementById('rv-emoji').textContent = emoji + ' 결과';
  document.getElementById('rv-pct').textContent   = pct + '%';
  document.getElementById('rv-score').textContent = `${score} / ${TOTAL} 정답`;

  const list = document.getElementById('rv-list');
  list.innerHTML = results.map((r, i) => {
    const q   = r.q;
    const cls = r.correct ? 'rv-ok' : 'rv-ng';
    const tag = r.correct ? '✓ 정답' : '✗ 오답';

    // build sentence with the complete word highlighted
    const wordSpan = `<span class="ans-word" style="background:${r.correct ? '#D1FAE5' : '#FEE2E2'}">${q.word}</span>`;
    const sentence = `${esc(q.before)} ${wordSpan} ${esc(q.after)}`;

    const posLabel = q.pos ? `<span class="rv-pos">${q.pos}</span>` : '';
    const defLine  = q.def  ? `<div class="rv-def">${posLabel}${esc(q.def)}</div>` : '';

    const answerLine = r.correct
      ? `<div class="rv-answer">✓ 정답: <strong>${q.word}</strong></div>`
      : `<div class="rv-answer">✗ 내 답: <strong>${r.userWord}</strong> &nbsp;→&nbsp; 정답: <strong>${q.word}</strong></div>`;

    return `
      <div class="rv-card ${cls}">
        <div class="rv-num">${tag} &nbsp;·&nbsp; ${esc(q.cat)} &nbsp;·&nbsp; Q${i + 1}</div>
        <div class="rv-sentence">${sentence}</div>
        ${answerLine}
        ${defLine}
      </div>`;
  }).join('');
}
